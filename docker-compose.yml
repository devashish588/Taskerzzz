services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskerzz
      POSTGRES_PASSWORD: taskerzz
      POSTGRES_DB: taskerzz
    ports:
      - "5433:5432"
    volumes:
      - taskerzz-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskerzz -d taskerzz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  taskerzz-postgres-data:
